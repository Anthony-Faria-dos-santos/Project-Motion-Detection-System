# MotionOps — versioned label set
# Synced to the repository by .github/workflows/labels-sync.yml
# Format: https://github.com/crazy-max/ghaction-github-labeler

# ── Area (which part of the monorepo) ─────────────────────────────────────
- name: "area:api"
  color: "1d76db"
  description: "Changes in apps/api"
- name: "area:web"
  color: "1d76db"
  description: "Changes in apps/web"
- name: "area:worker-cv"
  color: "1d76db"
  description: "Changes in apps/worker-cv (Python CV worker)"
- name: "area:packages"
  color: "1d76db"
  description: "Shared packages/*"
- name: "area:e2e"
  color: "1d76db"
  description: "End-to-end tests (Playwright)"
- name: "area:ci"
  color: "1d76db"
  description: "CI workflows, ruleset, repo automation"
- name: "area:infra"
  color: "1d76db"
  description: "Docker, docker-compose, deployment"
- name: "area:docs"
  color: "1d76db"
  description: "Documentation, README, security policy"

# ── Type (nature of the change) ────────────────────────────────────────────
- name: "type:bug"
  color: "d73a4a"
  description: "Something is broken"
- name: "type:feature"
  color: "0e8a16"
  description: "New feature or capability"
- name: "type:chore"
  color: "cfd3d7"
  description: "Maintenance, cleanup, no behavior change"
- name: "type:refactor"
  color: "c5def5"
  description: "Refactor with no behavior change"
- name: "type:perf"
  color: "fbca04"
  description: "Performance improvement"
- name: "type:test"
  color: "bfd4f2"
  description: "Adds or improves tests"
- name: "type:security"
  color: "b60205"
  description: "Security-related change"

# ── Lifecycle / triage ─────────────────────────────────────────────────────
- name: "dependencies"
  color: "0366d6"
  description: "Dependency updates (Dependabot, manual)"
- name: "breaking"
  color: "b60205"
  description: "Breaking change (semver-major)"
- name: "good first issue"
  color: "7057ff"
  description: "Good for newcomers"
- name: "help wanted"
  color: "008672"
  description: "Extra attention is needed"
- name: "needs-triage"
  color: "ededed"
  description: "Awaiting initial triage"
- name: "blocked"
  color: "e11d21"
  description: "Blocked by an external factor"
- name: "wontfix"
  color: "ffffff"
  description: "This will not be worked on"
- name: "duplicate"
  color: "cfd3d7"
  description: "Duplicate of another issue/PR"
