# Sync the repository labels with .github/labels.yml.
# Runs on changes to the labels file (main) and can be triggered manually.
# A "dry-run" run is performed on PRs that touch labels.yml so changes
# can be reviewed before being applied.

name: Labels sync

on:
  push:
    branches: [main]
    paths:
      - .github/labels.yml
  pull_request:
    paths:
      - .github/labels.yml
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: labels-sync-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    name: Sync labels (${{ github.event_name == 'pull_request' && 'dry-run' || 'apply' }})
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run github-labeler
        uses: crazy-max/ghaction-github-labeler@v5
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          yaml-file: .github/labels.yml
          dry-run: ${{ github.event_name == 'pull_request' }}
          skip-delete: false
