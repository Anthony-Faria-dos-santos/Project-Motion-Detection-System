name: typecheck
on:
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @motionops/api exec prisma generate
      - run: pnpm -r typecheck
