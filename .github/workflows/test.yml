name: test
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  unit:
    name: unit + component tests (no DB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Prisma client is generated lazily on first use; do it up-front so the
      # api unit suite can import from @prisma/client without network calls.
      - run: pnpm --filter @motionops/api exec prisma generate
      - run: pnpm -r test

  # e2e job is defined but gated on a repository variable so it only runs
  # once the Supabase / Postgres test project is wired up.
  e2e:
    name: playwright e2e (Chromium)
    if: ${{ vars.ENABLE_E2E == 'true' }}
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter e2e exec playwright install --with-deps chromium
      - run: pnpm --filter @motionops/api exec prisma generate
      - run: pnpm --filter e2e test
        env:
          CI: 'true'
          DATABASE_URL: ${{ secrets.E2E_DATABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.E2E_SUPABASE_SERVICE_KEY }}
          JWT_SECRET: ${{ secrets.E2E_JWT_SECRET }}
          MFA_ENCRYPTION_KEY: ${{ secrets.E2E_MFA_ENCRYPTION_KEY }}
          WORKER_API_KEY: ${{ secrets.E2E_WORKER_API_KEY }}
