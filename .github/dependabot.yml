# .github/dependabot.yml
# Dependabot pour MotionOps (monorepo pnpm + worker Python + Docker + GitHub Actions)
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2

updates:
  # ---------------------------------------------------------------
  # 1) JavaScript / TypeScript — pnpm workspace (racine)
  #    Dependabot suit automatiquement les workspaces déclarés
  #    dans pnpm-workspace.yaml depuis la racine.
  # ---------------------------------------------------------------
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 10
    versioning-strategy: "increase"
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"
    groups:
      minor-and-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "@playwright/*"
          - "playwright"
          - "@testing-library/*"
      tooling:
        patterns:
          - "typescript"
          - "turbo"
          - "eslint"
          - "eslint-*"
          - "@typescript-eslint/*"
          - "prettier"
          - "prettier-*"
    ignore:
      # Node est piloté par .nvmrc, pas par package.json
      - dependency-name: "node"
      # Évite les majeures auto sur React (à reviewer manuellement)
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      # TypeScript 6.0 introduit des changements de résolution de modules
      # (ex: side-effect imports CSS) qui cassent le typecheck. Bump majeur
      # à reviewer manuellement (cf PR #32 fermée).
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      # ESLint 10 a un nouveau format de config qui peut casser la CI lint.
      # Bump majeur à reviewer manuellement (cf PR #32 fermée).
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]

  # ---------------------------------------------------------------
  # 2) Python — worker computer vision (apps/worker-cv)
  # ---------------------------------------------------------------
  - package-ecosystem: "pip"
    directory: "/apps/worker-cv"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
      - "worker-cv"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"
    groups:
      python-minor-and-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"

  # ---------------------------------------------------------------
  # 3) Docker — Dockerfiles applicatifs
  # ---------------------------------------------------------------
  - package-ecosystem: "docker"
    directories:
      - "/apps/api"
      - "/apps/web"
      - "/apps/worker-cv"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      docker-images:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"

  # ---------------------------------------------------------------
  # 4) docker-compose à la racine
  # ---------------------------------------------------------------
  - package-ecosystem: "docker-compose"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "docker-compose"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  # ---------------------------------------------------------------
  # 5) GitHub Actions — workflows CI dans .github/workflows
  # ---------------------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci(deps)"
      include: "scope"
    groups:
      actions-minor-and-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
