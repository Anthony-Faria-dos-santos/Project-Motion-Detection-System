<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 2450" width="100%" height="100%" style="background-color: #050814; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;">
    <defs>
        <!-- Background Gradient -->
        <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#020617"/>
            <stop offset="50%" stop-color="#0F172A"/>
            <stop offset="100%" stop-color="#020617"/>
        </linearGradient>

        <!-- Title Gradient -->
        <linearGradient id="text-gradient" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#38BDF8"/>
            <stop offset="50%" stop-color="#818CF8"/>
            <stop offset="100%" stop-color="#34D399"/>
        </linearGradient>

        <!-- Glow Filters -->
        <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="8" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <filter id="glow-violet" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="8" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>

        <!-- Node Gradients -->
        <radialGradient id="node-cyan" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#22D3EE"/>
            <stop offset="100%" stop-color="#0891B2"/>
        </radialGradient>
        <radialGradient id="node-violet" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#A78BFA"/>
            <stop offset="100%" stop-color="#7C3AED"/>
        </radialGradient>
        <radialGradient id="node-blue" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#60A5FA"/>
            <stop offset="100%" stop-color="#2563EB"/>
        </radialGradient>
    </defs>

    <!-- Background -->
    <rect width="100%" height="100%" fill="url(#bg-grad)"/>
    
    <!-- Abstract Background Grid/Circles for Depth -->
    <path d="M0 200 L1200 200 M0 600 L1200 600 M0 1000 L1200 1000 M0 1400 L1200 1400 M0 1800 L1200 1800 M0 2200 L1200 2200" stroke="#1E293B" stroke-width="1" stroke-dasharray="4 12" opacity="0.3" />
    <path d="M300 0 L300 2450 M600 0 L600 2450 M900 0 L900 2450" stroke="#1E293B" stroke-width="1" stroke-dasharray="4 12" opacity="0.3" />
    <circle cx="200" cy="550" r="300" fill="#06B6D4" opacity="0.03" filter="url(#glow-cyan)"/>
    <circle cx="1000" cy="800" r="350" fill="#8B5CF6" opacity="0.03" filter="url(#glow-violet)"/>

    <!-- ================= HEADER SECTION ================= -->
    <text x="600" y="100" fill="url(#text-gradient)" font-size="56" font-weight="800" text-anchor="middle" letter-spacing="2">MotionOps</text>
    <text x="600" y="140" fill="#38BDF8" font-size="20" font-weight="500" text-anchor="middle" letter-spacing="4">VIDEO ANALYTICS PLATFORM</text>

    <!-- Intro Card -->
    <rect x="250" y="180" width="700" height="150" rx="16" fill="#0F172A" stroke="#1E293B" stroke-width="2"/>
    <text x="600" y="225" fill="#F8FAFC" font-size="18" font-weight="600" text-anchor="middle">A platform built around a simple idea:</text>
    <text x="600" y="255" fill="#94A3B8" font-size="16" text-anchor="middle">A video feed is only useful once it can be supervised, understood, tuned and audited.</text>
    <text x="600" y="280" fill="#94A3B8" font-size="16" text-anchor="middle">Detecting motion is not enough. What matters is the chain that runs</text>
    <text x="600" y="305" fill="#E2E8F0" font-size="16" font-weight="500" text-anchor="middle">from the raw pixel to a human decision that leaves a trace.</text>

    <!-- ================= CENTRAL DATA PIPELINE (SPINE) ================= -->
    <!-- Main Vertical Path -->
    <path d="M600 330 L600 2050" stroke="#334155" stroke-width="4" stroke-dasharray="8 8"/>
    
    <!-- Animated Flow Particles on Spine -->
    <circle r="4" fill="#38BDF8" filter="url(#glow-cyan)">
        <animateMotion dur="6s" repeatCount="indefinite" path="M600 330 L600 2050" />
    </circle>
    <circle r="4" fill="#8B5CF6" filter="url(#glow-violet)">
        <animateMotion dur="6s" repeatCount="indefinite" begin="2s" path="M600 330 L600 2050" />
    </circle>
    <circle r="4" fill="#10B981">
        <animateMotion dur="6s" repeatCount="indefinite" begin="4s" path="M600 330 L600 2050" />
    </circle>

    <!-- ================= ARCHITECTURE PILLARS ================= -->
    
    <!-- Section 1: Vision Worker (Left) -->
    <path d="M600 480 L550 480" stroke="#06B6D4" stroke-width="3" stroke-dasharray="4 4" />
    <circle cx="600" cy="480" r="8" fill="#0F172A" stroke="#06B6D4" stroke-width="3"/>
    <circle cx="600" cy="480" r="3" fill="#06B6D4" filter="url(#glow-cyan)"/>
    
    <rect x="150" y="390" width="400" height="200" rx="12" fill="#0F172A" stroke="#06B6D4" stroke-width="2"/>
    <rect x="150" y="390" width="8" height="200" fill="#06B6D4" rx="4"/>
    <text x="180" y="430" fill="#22D3EE" font-size="18" font-weight="700" letter-spacing="1">1. VISION WORKER</text>
    <text x="180" y="455" fill="#94A3B8" font-size="13" font-weight="600">PERCEPTION ENGINE</text>
    <text x="180" y="490" fill="#F8FAFC" font-size="15">• Ingests video sources &amp; runs OpenCV.</text>
    <text x="180" y="520" fill="#F8FAFC" font-size="15">• Applies YOLO detection &amp; ByteTrack.</text>
    <text x="180" y="550" fill="#F8FAFC" font-size="15">• Emits timestamped observations.</text>
    <text x="180" y="580" fill="#22D3EE" font-size="15" font-weight="500">• Qualified by hot-reloading rules.</text>

    <!-- Section 2: Core API (Right) -->
    <path d="M600 680 L650 680" stroke="#8B5CF6" stroke-width="3" stroke-dasharray="4 4" />
    <circle cx="600" cy="680" r="8" fill="#0F172A" stroke="#8B5CF6" stroke-width="3"/>
    <circle cx="600" cy="680" r="3" fill="#8B5CF6" filter="url(#glow-violet)"/>

    <rect x="650" y="580" width="400" height="200" rx="12" fill="#0F172A" stroke="#8B5CF6" stroke-width="2"/>
    <rect x="1042" y="580" width="8" height="200" fill="#8B5CF6" rx="4"/>
    <text x="680" y="620" fill="#A78BFA" font-size="18" font-weight="700" letter-spacing="1">2. CORE API</text>
    <text x="680" y="645" fill="#94A3B8" font-size="13" font-weight="600">SYSTEM ORCHESTRATOR</text>
    <text x="680" y="680" fill="#F8FAFC" font-size="15">• Node.js, Express &amp; Prisma on Postgres.</text>
    <text x="680" y="710" fill="#F8FAFC" font-size="15">• Supabase Auth &amp; Role-Based Access.</text>
    <text x="680" y="740" fill="#F8FAFC" font-size="15">• Socket.IO WebSocket hub for live state.</text>
    <text x="680" y="770" fill="#A78BFA" font-size="15" font-weight="500">• Maintains an unalterable audit log.</text>

    <!-- Section 3: Frontend Web (Left) -->
    <path d="M600 890 L550 890" stroke="#3B82F6" stroke-width="3" stroke-dasharray="4 4" />
    <circle cx="600" cy="890" r="8" fill="#0F172A" stroke="#3B82F6" stroke-width="3"/>
    <circle cx="600" cy="890" r="3" fill="#3B82F6" filter="url(#glow-cyan)"/>

    <rect x="150" y="770" width="400" height="240" rx="12" fill="#0F172A" stroke="#3B82F6" stroke-width="2"/>
    <rect x="150" y="770" width="8" height="240" fill="#3B82F6" rx="4"/>
    <text x="180" y="810" fill="#60A5FA" font-size="18" font-weight="700" letter-spacing="1">3. PRESENTATION LAYER</text>
    <text x="180" y="835" fill="#94A3B8" font-size="13" font-weight="600">FRONTEND SURFACES (NEXT.JS)</text>
    <text x="180" y="870" fill="#F8FAFC" font-size="15">• Real-time supervision (live feed context)</text>
    <text x="180" y="900" fill="#F8FAFC" font-size="15">• Admin console (tune with immediate feedback)</text>
    <text x="180" y="930" fill="#F8FAFC" font-size="15">• Investigation (timeline, clips, annotations)</text>
    <text x="180" y="960" fill="#F8FAFC" font-size="15">• Health dashboard (latency &amp; engine metrics)</text>
    <text x="180" y="990" fill="#60A5FA" font-size="15" font-weight="500">• Empty/error states handled explicitly.</text>

    <!-- ================= TARGET ROLES SECTION ================= -->
    <text x="600" y="1100" fill="#F8FAFC" font-size="24" font-weight="700" text-anchor="middle" letter-spacing="1">BUILT FOR 4 SPECIFIC ROLES</text>
    <path d="M500 1120 L700 1120" stroke="#475569" stroke-width="2" />

    <!-- Branching paths for roles -->
    <path d="M600 1150 L247 1150 L247 1190" stroke="#475569" stroke-width="2" fill="none" />
    <path d="M600 1150 L482 1150 L482 1190" stroke="#475569" stroke-width="2" fill="none" />
    <path d="M600 1150 L717 1150 L717 1190" stroke="#475569" stroke-width="2" fill="none" />
    <path d="M600 1150 L952 1150 L952 1190" stroke="#475569" stroke-width="2" fill="none" />

    <!-- Role 1: Operator -->
    <rect x="140" y="1190" width="215" height="160" rx="10" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <circle cx="247" cy="1225" r="16" fill="#0F172A" stroke="#10B981" stroke-width="2"/>
    <text x="247" cy="1230" fill="#10B981" font-size="16" text-anchor="middle" font-weight="bold">Op</text>
    <text x="247" y="1265" fill="#F8FAFC" font-size="16" font-weight="700" text-anchor="middle">Operator</text>
    <text x="247" y="1295" fill="#94A3B8" font-size="14" text-anchor="middle">Watches live feed</text>
    <text x="247" y="1315" fill="#94A3B8" font-size="14" text-anchor="middle">Qualifies events fast</text>
    <text x="247" y="1335" fill="#94A3B8" font-size="14" text-anchor="middle">Escalates attention</text>

    <!-- Role 2: Administrator -->
    <rect x="375" y="1190" width="215" height="160" rx="10" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <circle cx="482" cy="1225" r="16" fill="#0F172A" stroke="#F59E0B" stroke-width="2"/>
    <text x="482" cy="1230" fill="#F59E0B" font-size="16" text-anchor="middle" font-weight="bold">Ad</text>
    <text x="482" y="1265" fill="#F8FAFC" font-size="16" font-weight="700" text-anchor="middle">Administrator</text>
    <text x="482" y="1295" fill="#94A3B8" font-size="14" text-anchor="middle">Adjusts rules live</text>
    <text x="482" y="1315" fill="#94A3B8" font-size="14" text-anchor="middle">Manages sensitive ops</text>
    <text x="482" y="1335" fill="#94A3B8" font-size="14" text-anchor="middle">Leaves audited trails</text>

    <!-- Role 3: Analyst -->
    <rect x="610" y="1190" width="215" height="160" rx="10" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <circle cx="717" cy="1225" r="16" fill="#0F172A" stroke="#3B82F6" stroke-width="2"/>
    <text x="717" cy="1230" fill="#3B82F6" font-size="16" text-anchor="middle" font-weight="bold">An</text>
    <text x="717" y="1265" fill="#F8FAFC" font-size="16" font-weight="700" text-anchor="middle">Analyst</text>
    <text x="717" y="1295" fill="#94A3B8" font-size="14" text-anchor="middle">Reopens history</text>
    <text x="717" y="1315" fill="#94A3B8" font-size="14" text-anchor="middle">Reviews event clips</text>
    <text x="717" y="1335" fill="#94A3B8" font-size="14" text-anchor="middle">Builds incident narratives</text>

    <!-- Role 4: Maintainer -->
    <rect x="845" y="1190" width="215" height="160" rx="10" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <circle cx="952" cy="1225" r="16" fill="#0F172A" stroke="#A855F7" stroke-width="2"/>
    <text x="952" cy="1230" fill="#A855F7" font-size="16" text-anchor="middle" font-weight="bold">Mn</text>
    <text x="952" y="1265" fill="#F8FAFC" font-size="16" font-weight="700" text-anchor="middle">Maintainer</text>
    <text x="952" y="1295" fill="#94A3B8" font-size="14" text-anchor="middle">Follows system health</text>
    <text x="952" y="1315" fill="#94A3B8" font-size="14" text-anchor="middle">Watches engine drift</text>
    <text x="952" y="1335" fill="#94A3B8" font-size="14" text-anchor="middle">Loops false-positives</text>

    <!-- ================= KEY DIFFERENTIATORS ================= -->
    <text x="600" y="1450" fill="#F8FAFC" font-size="24" font-weight="700" text-anchor="middle" letter-spacing="1">THE ARCHITECTURAL DIFFERENCE</text>
    <path d="M500 1470 L700 1470" stroke="#475569" stroke-width="2" />

    <!-- Feature 1 -->
    <rect x="250" y="1510" width="700" height="110" rx="12" fill="#0F172A" stroke="#22D3EE" stroke-width="1" stroke-dasharray="6 4"/>
    <circle cx="280" cy="1565" r="6" fill="#22D3EE" filter="url(#glow-cyan)"/>
    <text x="310" y="1545" fill="#22D3EE" font-size="18" font-weight="700">Hot Rule Reload</text>
    <text x="310" y="1575" fill="#CBD5E1" font-size="15">Test a threshold, observe its effect on the live feed immediately, and revert it</text>
    <text x="310" y="1600" fill="#94A3B8" font-size="15">in one action, which a frozen pipeline cannot offer. No stream restarts.</text>

    <!-- Feature 2 -->
    <rect x="250" y="1640" width="700" height="110" rx="12" fill="#0F172A" stroke="#A78BFA" stroke-width="1" stroke-dasharray="6 4"/>
    <circle cx="280" cy="1695" r="6" fill="#A78BFA" filter="url(#glow-violet)"/>
    <text x="310" y="1675" fill="#A78BFA" font-size="18" font-weight="700">Forensic Provenance</text>
    <text x="310" y="1705" fill="#CBD5E1" font-size="15">An event from 2026 stays interpretable after ten engine revisions.</text>
    <text x="310" y="1730" fill="#94A3B8" font-size="15">Events carry engine version, active rule, scene profile &amp; parameters at emission.</text>

    <!-- Feature 3 -->
    <rect x="250" y="1770" width="700" height="110" rx="12" fill="#0F172A" stroke="#10B981" stroke-width="1" stroke-dasharray="6 4"/>
    <circle cx="280" cy="1825" r="6" fill="#10B981" />
    <text x="310" y="1805" fill="#10B981" font-size="18" font-weight="700">First-Class Audit &amp; RBAC</text>
    <text x="310" y="1835" fill="#CBD5E1" font-size="15">Audit and RBAC are treated as core product concerns, not patches.</text>
    <text x="310" y="1860" fill="#94A3B8" font-size="15">Every admin action, config change, and MFA session leaves a structured trace.</text>

    <!-- ================= TECHNOLOGY STACK ================= -->
    <text x="600" y="2000" fill="#F8FAFC" font-size="24" font-weight="700" text-anchor="middle" letter-spacing="1">TECHNOLOGY STACK</text>
    <path d="M500 2020 L700 2020" stroke="#475569" stroke-width="2" />

    <!-- Row 1: Frontend -->
    <text x="240" y="2090" fill="#94A3B8" font-size="14" font-weight="600" text-anchor="end" letter-spacing="1">FRONTEND</text>
    <!-- Next.js 15 -->
    <rect x="270" y="2065" width="100" height="36" rx="18" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <text x="320" y="2088" fill="#E2E8F0" font-size="14" text-anchor="middle">Next.js 15</text>
    <!-- React 19 -->
    <rect x="385" y="2065" width="90" height="36" rx="18" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <text x="430" y="2088" fill="#E2E8F0" font-size="14" text-anchor="middle">React 19</text>
    <!-- Tailwind v4 -->
    <rect x="490" y="2065" width="100" height="36" rx="18" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <text x="540" y="2088" fill="#E2E8F0" font-size="14" text-anchor="middle">Tailwind v4</text>
    <!-- shadcn/ui -->
    <rect x="605" y="2065" width="100" height="36" rx="18" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <text x="655" y="2088" fill="#E2E8F0" font-size="14" text-anchor="middle">shadcn/ui</text>

    <!-- Row 2: Core API -->
    <text x="240" y="2145" fill="#94A3B8" font-size="14" font-weight="600" text-anchor="end" letter-spacing="1">CORE API</text>
    <!-- Node.js -->
    <rect x="270" y="2120" width="85" height="36" rx="18" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <text x="312" y="2143" fill="#E2E8F0" font-size="14" text-anchor="middle">Node.js</text>
    <!-- Express 5 -->
    <rect x="370" y="2120" width="95" height="36" rx="18" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <text x="417" y="2143" fill="#E2E8F0" font-size="14" text-anchor="middle">Express 5</text>
    <!-- Prisma -->
    <rect x="480" y="2120" width="80" height="36" rx="18" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <text x="520" y="2143" fill="#E2E8F0" font-size="14" text-anchor="middle">Prisma</text>
    <!-- Socket.IO -->
    <rect x="575" y="2120" width="95" height="36" rx="18" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <text x="622" y="2143" fill="#E2E8F0" font-size="14" text-anchor="middle">Socket.IO</text>
    <!-- Supabase Auth -->
    <rect x="685" y="2120" width="130" height="36" rx="18" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <text x="750" y="2143" fill="#E2E8F0" font-size="14" text-anchor="middle">Supabase Auth</text>

    <!-- Row 3: Vision Engine -->
    <text x="240" y="2200" fill="#94A3B8" font-size="14" font-weight="600" text-anchor="end" letter-spacing="1">VISION ENGINE</text>
    <!-- Python 3.12 -->
    <rect x="270" y="2175" width="105" height="36" rx="18" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <text x="322" y="2198" fill="#E2E8F0" font-size="14" text-anchor="middle">Python 3.12</text>
    <!-- OpenCV -->
    <rect x="390" y="2175" width="85" height="36" rx="18" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <text x="432" y="2198" fill="#E2E8F0" font-size="14" text-anchor="middle">OpenCV</text>
    <!-- YOLO -->
    <rect x="490" y="2175" width="65" height="36" rx="18" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <text x="522" y="2198" fill="#E2E8F0" font-size="14" text-anchor="middle">YOLO</text>
    <!-- ByteTrack -->
    <rect x="570" y="2175" width="95" height="36" rx="18" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <text x="617" y="2198" fill="#E2E8F0" font-size="14" text-anchor="middle">ByteTrack</text>
    <!-- FastAPI -->
    <rect x="680" y="2175" width="85" height="36" rx="18" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <text x="722" y="2198" fill="#E2E8F0" font-size="14" text-anchor="middle">FastAPI</text>

    <!-- Row 4: Infrastructure -->
    <text x="240" y="2255" fill="#94A3B8" font-size="14" font-weight="600" text-anchor="end" letter-spacing="1">INFRA</text>
    <!-- Postgres -->
    <rect x="270" y="2230" width="95" height="36" rx="18" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <text x="317" y="2253" fill="#E2E8F0" font-size="14" text-anchor="middle">PostgreSQL</text>
    <!-- Vercel -->
    <rect x="380" y="2230" width="75" height="36" rx="18" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <text x="417" y="2253" fill="#E2E8F0" font-size="14" text-anchor="middle">Vercel</text>
    <!-- Hostinger VPS -->
    <rect x="470" y="2230" width="130" height="36" rx="18" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <text x="535" y="2253" fill="#E2E8F0" font-size="14" text-anchor="middle">Hostinger KVM2</text>

    <!-- Footer -->
    <text x="600" y="2380" fill="#475569" font-size="13" font-weight="500" text-anchor="middle" letter-spacing="2">MOTIONOPS • ARCHITECTURE OVERVIEW</text>
    
</svg>